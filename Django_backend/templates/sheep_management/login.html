<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 羊只管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 背景装饰圆 */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -120px;
            left: -80px;
            width: 450px;
            height: 450px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .login-wrapper {
            width: 420px;
            position: relative;
            z-index: 1;
        }

        /* 顶部 Logo 区 */
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .login-title {
            color: white;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-subtitle {
            color: rgba(255, 255, 255, 0.75);
            font-size: 14px;
            margin-top: 6px;
        }

        /* 卡片 */
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        /* 消息提示 */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error {
            background: #fff5f5;
            color: #c0392b;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fff4;
            color: #27ae60;
            border: 1px solid #bbf7d0;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            pointer-events: none;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            background: #fafafa;
        }
        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background: white;
        }
        .form-input::placeholder {
            color: #bbb;
        }

        /* 密码显示/隐藏 */
        .pwd-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #aaa;
            font-size: 15px;
            user-select: none;
            transition: color 0.2s;
        }
        .pwd-toggle:hover {
            color: #667eea;
        }

        /* 记住我 */
        .form-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #666;
            cursor: pointer;
        }
        .remember-me input[type="checkbox"] {
            width: 15px;
            height: 15px;
            accent-color: #667eea;
            cursor: pointer;
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.25s, transform 0.15s;
            letter-spacing: 2px;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .btn-login:active {
            transform: translateY(0);
        }

        /* 底部版权 */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
        }

        /* 分割线提示 */
        .role-tip {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
        .role-tip span {
            display: inline-block;
            padding: 3px 10px;
            background: #f5f5f5;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <!-- 顶部 Logo -->
    <div class="login-header">
        <div class="logo-icon">🐑</div>
        <div class="login-title">羊只管理系统</div>
        <div class="login-subtitle">Sheep Management Platform</div>
    </div>

    <!-- 登录卡片 -->
    <div class="login-card">

        <!-- Django Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                    {% if message.tags == 'error' %}⚠️{% else %}✅{% endif %}
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- 用户名 -->
            <div class="form-group">
                <label class="form-label">用户名</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input
                        type="text"
                        name="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        value="{{ username|default:'' }}"
                        autocomplete="username"
                        autofocus
                    >
                </div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input
                        type="password"
                        name="password"
                        id="passwordInput"
                        class="form-input"
                        placeholder="请输入密码"
                        autocomplete="current-password"
                    >
                    <span class="pwd-toggle" onclick="togglePassword()" id="pwdToggle" title="显示/隐藏密码">👁️</span>
                </div>
            </div>

            <!-- 记住我 -->
            <div class="form-footer">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> 记住我
                </label>
            </div>

            <button type="submit" class="btn-login">登 录</button>
        </form>

        <div class="role-tip">
            <span>仅限管理员 &amp; 养殖户登录</span>
        </div>

        <div style="text-align:center; margin-top:18px; padding-top:18px; border-top:1px solid #f0f0f0;">
            <span style="font-size:13px; color:#999;">还没有账号？</span>
            <a href="{% url 'register' %}" style="font-size:13px; color:#667eea; font-weight:600; text-decoration:none; margin-left:4px;">申请成为养殖户 →</a>
        </div>
    </div>

    <div class="login-footer">
        © 2026 羊只管理系统 · All Rights Reserved
    </div>
</div>

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const toggle = document.getElementById('pwdToggle');
        if (input.type === 'password') {
            input.type = 'text';
            toggle.textContent = '🙈';
        } else {
            input.type = 'password';
            toggle.textContent = '👁️';
        }
    }
</script>

</body>
</html>
