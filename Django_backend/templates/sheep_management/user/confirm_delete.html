{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card" style="max-width: 680px;">
    <h2 style="margin-bottom: 16px;">确认删除用户</h2>

    <p style="margin-bottom: 16px;">你即将删除以下用户：</p>
    <table>
        <tr>
            <th style="width: 160px;">用户ID</th>
            <td>{{ target_user.id }}</td>
        </tr>
        <tr>
            <th>用户名</th>
            <td>{{ target_user.username }}</td>
        </tr>
        <tr>
            <th>昵称</th>
            <td>{{ target_user.nickname|default:'未设置' }}</td>
        </tr>
        <tr>
            <th>角色</th>
            <td>{{ target_user.get_role_display }}</td>
        </tr>
    </table>

    <p style="color: #e74c3c; margin: 18px 0;">⚠ 删除后无法恢复，请谨慎操作。</p>

    <form method="post" style="display: flex; gap: 10px;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">确认删除</button>
        <a href="{% url 'user_detail' target_user.pk %}" class="btn" style="background: #95a5a6;">取消</a>
    </form>
</div>
{% endblock %}
