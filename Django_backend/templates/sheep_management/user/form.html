{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card" style="max-width: 760px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>{{ title }}</h2>
        <a href="{% url 'user_list' %}" class="btn" style="background: #95a5a6;">返回列表</a>
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- 头像上传 -->
        <div class="form-group">
            <label>头像</label>
            <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
                <div id="avatar-preview-wrap" style="width:80px;height:80px;border-radius:50%;overflow:hidden;background:#f0f0f0;display:flex;align-items:center;justify-content:center;border:2px dashed #ddd;flex-shrink:0;">
                    {% if target_user and target_user.avatar_url %}
                        <img id="avatar-preview" src="{{ target_user.avatar_url }}" style="width:100%;height:100%;object-fit:cover;">
                    {% else %}
                        <span id="avatar-preview" style="font-size:32px;">&#x1F464;</span>
                    {% endif %}
                </div>
                <div>
                    <input type="file" name="avatar" id="avatar-input" accept="image/*" onchange="previewAvatar(this)" style="display:none;">
                    <button type="button" class="btn" style="background:#3498db;" onclick="document.getElementById('avatar-input').click()">
                        &#x1F4F7; {% if target_user and target_user.avatar_url %}更换头像{% else %}上传头像{% endif %}
                    </button>
                    <div style="margin-top:6px;font-size:12px;color:#999;">&#x2601;&#xfe0f; 存储到 Cloudflare R2，支持 jpg/png，建议不超过 2MB</div>
                    <div id="avatar-filename" style="margin-top:4px;font-size:12px;color:#666;"></div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label for="username">用户名 *</label>
            <input id="username" type="text" name="username" required
                   value="{% if target_user %}{{ target_user.username }}{% endif %}" placeholder="请输入用户名">
        </div>

        <div class="form-group">
            <label for="password">{% if is_create %}密码 *{% else %}新密码（留空则不修改）{% endif %}</label>
            <input id="password" type="password" name="password" {% if is_create %}required{% endif %}
                   placeholder="{% if is_create %}请输入密码{% else %}如需重置密码请填写{% endif %}">
        </div>

        <div class="form-group">
            <label for="nickname">昵称</label>
            <input id="nickname" type="text" name="nickname"
                   value="{% if target_user %}{{ target_user.nickname|default:'' }}{% endif %}" placeholder="请输入昵称">
        </div>

        <div class="form-group">
            <label for="mobile">手机号</label>
            <input id="mobile" type="text" name="mobile"
                   value="{% if target_user %}{{ target_user.mobile|default:'' }}{% endif %}" placeholder="请输入手机号">
        </div>

        <div class="form-group">
            <label for="description">个人简介</label>
            <textarea id="description" name="description" rows="3"
                      placeholder="请输入个人简介（最多200字）"
                      style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;resize:vertical;">{% if target_user %}{{ target_user.description|default:'' }}{% endif %}</textarea>
        </div>

        <div class="form-group">
            <label for="role">角色</label>
            <select id="role" name="role">
                <option value="0" {% if target_user and target_user.role == 0 %}selected{% endif %}>普通用户</option>
                <option value="1" {% if target_user and target_user.role == 1 %}selected{% endif %}>养殖户</option>
                <option value="2" {% if target_user and target_user.role == 2 %}selected{% endif %}>管理员</option>
            </select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            <input id="is_verified" type="checkbox" name="is_verified" style="width: auto;"
                   {% if target_user and target_user.is_verified %}checked{% endif %}>
            <label for="is_verified" style="margin: 0;">养殖户审核通过</label>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 24px;">
            <button type="submit" class="btn btn-success">保存</button>
            <a href="{% url 'user_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>

<script>
function previewAvatar(input) {
    if (!input.files || !input.files[0]) return;
    var file = input.files[0];
    document.getElementById('avatar-filename').textContent = '已选择: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
    var reader = new FileReader();
    reader.onload = function(e) {
        var wrap = document.getElementById('avatar-preview-wrap');
        wrap.innerHTML = '<img id="avatar-preview" src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">';
    };
    reader.readAsDataURL(file);
}
</script>
{% endblock %}
