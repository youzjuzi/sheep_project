{% extends 'sheep_management/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            {% if sheep %}
            <div class="form-group">
                <label>耳标号</label>
                <input type="text" value="{{ sheep.ear_tag }}" disabled style="background:#f1f5f9;color:#64748b;cursor:not-allowed;">
                <span style="font-size:12px;color:#999;">系统自动生成，不可修改</span>
            </div>
            {% endif %}
            
            {% if is_admin %}
            <div class="form-group">
                <label>所属养殖户 *</label>
                <select name="owner" required>
                    <option value="">请选择养殖户</option>
                    {% for b in breeders %}
                    <option value="{{ b.id }}" {% if sheep and sheep.owner_id == b.id %}selected{% endif %}>
                        {{ b.nickname|default:b.username }} (ID:{{ b.id }}{% if b.mobile %} / {{ b.mobile }}{% endif %})
                    </option>
                    {% endfor %}
                </select>
                {% if not sheep %}
                <span style="font-size:12px;color:#999;">选择要为哪位养殖户添加羊只</span>
                {% endif %}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label>性别 *</label>
                <select name="gender" required>
                    <option value="">请选择</option>
                    <option value="1" {% if sheep.gender == 1 %}selected{% endif %}>公</option>
                    <option value="0" {% if sheep.gender == 0 %}selected{% endif %}>母</option>
                </select>
            </div>
            <div class="form-group">
                <label>健康状态 *</label>
                <select name="health_status" required>
                    {% for value, label in health_choices %}
                    <option value="{{ value }}" {% if sheep.health_status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>出生日期</label>
                <input type="date" name="birth_date" value="{% if sheep and sheep.birth_date %}{{ sheep.birth_date|date:'Y-m-d' }}{% endif %}">
            </div>
            <div class="form-group">
                <label>体重(kg) *</label>
                <input type="number" name="weight" step="0.1" required value="{% if sheep %}{{ sheep.weight }}{% endif %}">
            </div>
            <div class="form-group">
                <label>身高(cm) *</label>
                <input type="number" name="height" step="0.1" required value="{% if sheep %}{{ sheep.height }}{% endif %}">
            </div>
            <div class="form-group">
                <label>体长(cm) *</label>
                <input type="number" name="length" step="0.1" required value="{% if sheep %}{{ sheep.length }}{% endif %}">
            </div>
            <div class="form-group">
                <label>价格（元）</label>
                <input type="number" name="price" step="0.01" min="0" value="{% if sheep %}{{ sheep.price }}{% else %}0{% endif %}" placeholder="请输入销售价格">
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn">保存</button>
            <a href="{% url 'sheep_list' %}" class="btn" style="background: #95a5a6;">取消</a>
        </div>
    </form>
</div>
{% endblock %}
