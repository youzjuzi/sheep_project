<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请已提交 - 羊只管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 52px 48px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            max-width: 440px; width: 90%;
        }
        .success-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 20px;
        }
        h2 { font-size: 24px; color: #333; margin-bottom: 12px; }
        .desc { font-size: 14px; color: #666; line-height: 1.8; margin-bottom: 28px; }
        .desc strong { color: #667eea; }

        .steps {
            display: flex; justify-content: center; gap: 0;
            margin-bottom: 32px;
        }
        .s { text-align: center; flex: 1; }
        .s-circle {
            width: 36px; height: 36px; border-radius: 50%;
            margin: 0 auto 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .s-circle.done { background: #d1fae5; }
        .s-circle.pending { background: #fef3c7; }
        .s-circle.wait { background: #f1f5f9; }
        .s-label { font-size: 12px; color: #888; }
        .s-label.active { color: #667eea; font-weight: 600; }
        .s-line { flex: none; width: 40px; height: 2px; background: #e5e7eb; align-self: center; margin-bottom: 20px; }

        .btn-login {
            display: inline-block; padding: 12px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-radius: 8px; text-decoration: none;
            font-size: 15px; font-weight: 600; letter-spacing: 1px;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: .9; }
        .footer-note { font-size: 12px; color: #bbb; margin-top: 20px; }
    </style>
</head>
<body>
<div class="card">
    <div class="success-icon">✅</div>
    <h2>申请已提交！</h2>
    <p class="desc">
        <strong>{{ nickname }}</strong>，您的养殖户申请已成功提交。<br>
        请耐心等待管理员审核，审核通过后即可使用账号登录后台。
    </p>

    <!-- 进度步骤 -->
    <div class="steps">
        <div class="s">
            <div class="s-circle done">✅</div>
            <div class="s-label">提交申请</div>
        </div>
        <div class="s-line"></div>
        <div class="s">
            <div class="s-circle pending">⏳</div>
            <div class="s-label active">等待审核</div>
        </div>
        <div class="s-line"></div>
        <div class="s">
            <div class="s-circle wait">🔒</div>
            <div class="s-label">登录后台</div>
        </div>
    </div>

    <a href="{% url 'login' %}" class="btn-login">返回登录页</a>
    <p class="footer-note">审核通常在 1~2 个工作日内完成</p>
</div>
</body>
</html>
