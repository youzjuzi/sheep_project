{% extends 'sheep_management/base.html' %}

{% block page_title %}修改密码{% endblock %}

{% block content %}
<div class="card" style="max-width: 640px; margin: 0 auto;">
    <h2 style="margin-top:0; margin-bottom: 16px;">修改密码</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="old_password">原密码</label>
            <input id="old_password" name="old_password" type="password" required minlength="6" placeholder="请输入原密码">
        </div>

        <div class="form-group">
            <label for="new_password">新密码</label>
            <input id="new_password" name="new_password" type="password" required minlength="6" placeholder="请输入新密码（至少6位）">
        </div>

        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input id="confirm_password" name="confirm_password" type="password" required minlength="6" placeholder="请再次输入新密码">
        </div>

        <div style="display:flex; gap:10px;">
            <button type="submit" class="btn">保存新密码</button>
            <a href="{% url 'breeder_account' %}" class="btn" style="background:#95a5a6;">返回账号管理</a>
        </div>
    </form>
</div>
{% endblock %}
